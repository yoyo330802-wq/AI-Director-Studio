version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: manai_postgres
    environment:
      POSTGRES_USER: manai
      POSTGRES_PASSWORD: manai123
      POSTGRES_DB: manai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存与队列
  redis:
    image: redis:7-alpine
    container_name: manai_redis
    command: redis-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: manai_backend
    environment:
      DATABASE_URL: postgresql://manai:manai123@postgres:5432/manai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      VIDU_API_KEY: ${VIDU_API_KEY}
      WAN21_BASE_URL: ${WAN21_BASE_URL:-http://wan21:8080}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: manai_celery
    command: celery -A app.tasks.video_generation worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://manai:manai123@postgres:5432/manai
      REDIS_URL: redis://redis:6379/0
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      VIDU_API_KEY: ${VIDU_API_KEY}
      WAN21_BASE_URL: ${WAN21_BASE_URL:-http://wan21:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js 前端
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: manai_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: manai_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: manai_network
